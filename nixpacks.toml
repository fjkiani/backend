# nixpacks.toml\n# Explicitly tell Nixpacks to use Node.js and specify versions/commands.\n\nproviders = ["node"]\n\n[phases.setup]\n# Available Node.js versions can be found in Nixpkgs.\n# Example: nodejs_18, nodejs_20\nnixPkgs = ["nodejs_20"] \n\n[phases.build]\n# These commands run after \`npm install\` which Nixpacks usually runs by default for Node.js projects.\n# If your package.json\'s "build" script is sufficient (and it currently is just "npm install"), \n# you might not need explicit build cmds here, or just include your specific build script if any.\n# The default npm install should also handle your "postinstall" for puppeteer.\ncmds = ["npm run build"] # Your current build script is "npm install", postinstall runs after.\n\n[start]\n# This should match the start command for your application.\ncmd = "npm start" # This will run "node src/server.js" 